<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>学習ノート</title>

  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
          onload="onKaTeXReady()"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Noto+Sans+JP:wght@400;500;700;900&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />

  <style>
    /* ── Token ── */
    :root {
      --bg:      #F5F4EF;
      --surface: #FFFFFF;
      --ink:     #1C1C1C;
      --ink-2:   #888888;
      --line:    #DDDBD5;
      --accent:  #3730A3;
      --ok:      #166534;
      --ng:      #991B1B;
      --r: 10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }
    button { cursor: pointer; font-family: inherit; border: none; background: none; color: inherit; }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       SPLASH
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    #splash {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 900;
      transition: opacity .7s ease;
    }
    #splash.out {
      opacity: 0;
      pointer-events: none;
    }

    .splash-inner {
      position: relative;
      display: inline-block;
    }

    .splash-site-title {
      font-size: 2.4rem;
      font-weight: 900;
      letter-spacing: -.03em;
      opacity: 0;
      transform: translateY(10px);
      animation: s-up .55s ease .25s forwards;
    }
    .splash-by {
      position: absolute;
      right: 0;
      bottom: -1.4em;
      font-family: 'Great Vibes', cursive;
      font-size: 1.05rem;
      color: var(--ink-2);
      will-change: clip-path;
      clip-path: inset(0 100% 0 0);
      animation: s-write 1.1s cubic-bezier(.4,0,.2,1) .75s forwards;
      white-space: nowrap;
    }

    @keyframes s-up    { to { opacity:1; transform:translateY(0); } }
    @keyframes s-write { to { clip-path: inset(0 0% 0 0); } }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       LAYOUT
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .site-header {
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      padding: 15px 28px;
      display: flex;
      align-items: center;
      gap: 11px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .site-header h1 {
      font-size: 1.1rem;
      font-weight: 900;
      letter-spacing: -.02em;
    }
    .home-link {
      margin-left: auto;
      font-size: .82rem;
      color: var(--ink-2);
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--line);
      transition: border-color .15s, color .15s;
    }
    .home-link:hover { border-color: var(--ink-2); color: var(--ink); }

    /* ── Page fade ── */
    #app {
      max-width: 880px;
      margin: 0 auto;
      padding: 36px 20px 80px;
      transition: opacity .22s ease, transform .22s ease;
    }
    #app.fading {
      opacity: 0;
      transform: translateY(9px);
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       STATES
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .loading-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--ink-2);
    }
    .spinner {
      width: 30px;
      height: 30px;
      border: 2px solid var(--line);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .75s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      border: 1px solid var(--line);
      border-radius: var(--r);
      padding: 20px 24px;
      color: var(--ink-2);
      line-height: 1.9;
      font-size: .88rem;
    }
    .error-box code {
      font-family: monospace;
      background: var(--bg);
      padding: 1px 5px;
      border-radius: 3px;
      color: var(--ink);
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       SHARED COMPONENTS
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .back-btn {
      color: var(--ink-2);
      font-size: .82rem;
      margin-bottom: 24px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--line);
      transition: border-color .14s, color .14s;
    }
    .back-btn:hover { border-color: var(--ink-2); color: var(--ink); }

    .page-title {
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: -.025em;
      margin-bottom: 24px;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       HOME — subject grid
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .subjects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
      gap: 12px;
    }

    .subject-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r);
      padding: 20px 20px 17px;
      display: flex;
      align-items: flex-start;
      gap: 15px;
      cursor: pointer;
      transition: border-color .17s, box-shadow .17s, transform .17s;
    }
    .subject-card:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 18px rgba(0,0,0,.07);
      transform: translateY(-2px);
    }
    .subject-emoji   { font-size: 1.9rem; line-height: 1; flex-shrink: 0; margin-top: 1px; }
    .subject-name    { font-size: 1rem; font-weight: 700; margin-bottom: 8px; }
    .count-badges    { display: flex; gap: 6px; flex-wrap: wrap; }
    .count-badge {
      font-size: .71rem;
      color: var(--ink-2);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 2px 9px;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       SUBJECT detail
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .subject-header {
      display: flex;
      align-items: center;
      gap: 13px;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--line);
    }
    .subject-icon-lg { font-size: 2.1rem; }
    .subject-header h2 {
      font-size: 1.55rem;
      font-weight: 900;
      letter-spacing: -.025em;
    }

    .mat-section      { margin-bottom: 26px; }
    .mat-label {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--ink-2);
      margin-bottom: 9px;
    }
    .mat-list         { display: flex; flex-direction: column; gap: 7px; }

    .mat-item {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r);
      padding: 13px 17px;
      display: flex;
      align-items: center;
      gap: 13px;
      transition: border-color .14s;
    }
    .mat-item:hover   { border-color: var(--ink-2); }
    .mat-icon         { font-size: 1.15rem; flex-shrink: 0; }
    .mat-title        { flex: 1; font-size: .93rem; font-weight: 500; }
    .open-btn {
      background: var(--accent);
      color: #fff;
      border-radius: 7px;
      padding: 6px 15px;
      font-size: .8rem;
      font-weight: 700;
      flex-shrink: 0;
      transition: opacity .14s;
    }
    .open-btn:hover   { opacity: .82; }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       QUIZ
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .quiz-wrap   { max-width: 650px; margin: 0 auto; }
    .quiz-meta   { margin-bottom: 20px; }
    .quiz-title  {
      font-size: 1.25rem;
      font-weight: 900;
      letter-spacing: -.02em;
      margin-bottom: 12px;
    }
    .prog-bar    { height: 3px; background: var(--line); border-radius: 2px; overflow: hidden; margin-bottom: 6px; }
    .prog-fill   { height: 100%; background: var(--accent); border-radius: 2px; transition: width .35s ease; }
    .prog-text   { font-size: .78rem; color: var(--ink-2); font-family: 'Space Grotesk', sans-serif; }

    .quiz-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r);
      padding: 26px;
      margin-bottom: 11px;
    }
    .q-text {
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.85;
      margin-bottom: 20px;
    }
    .q-text .katex         { font-size: 1em; }
    .q-text .katex-display { margin: .5em 0; }

    .choices { display: flex; flex-direction: column; gap: 8px; }
    .choices .choice-btn { flex: 1; }

    .choice-btn {
      background: var(--bg);
      border: 1.5px solid var(--line);
      border-radius: var(--r);
      padding: 11px 16px;
      display: flex;
      align-items: center;
      gap: 13px;
      font-size: .93rem;
      font-weight: 500;
      text-align: left;
      width: 100%;
      transition: border-color .13s, background .13s;
    }
    .choice-btn:not(:disabled):hover { background: var(--surface); border-color: var(--ink-2); }
    .choice-btn:disabled              { cursor: default; }

    .badge {
      width: 27px;
      height: 27px;
      border-radius: 50%;
      background: var(--ink);
      color: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-size: .78rem;
      font-weight: 700;
      flex-shrink: 0;
      transition: background .2s;
    }
    .choice-btn.correct              { background: #F0FAF3; border-color: var(--ok); }
    .choice-btn.correct .badge       { background: var(--ok); }
    .choice-btn.wrong                { background: #FEF2F2; border-color: var(--ng); }
    .choice-btn.wrong .badge         { background: var(--ng); }

    .explain-box {
      background: var(--bg);
      border-left: 3px solid var(--accent);
      border-radius: 0 var(--r) var(--r) 0;
      padding: 11px 16px;
      font-size: .86rem;
      line-height: 1.85;
      margin-top: 13px;
      color: var(--ink-2);
    }
    .explain-box .katex { font-size: .97em; }

    /* ── Quiz animations ── */
    @keyframes card-enter {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes card-leave {
      from { opacity: 1; transform: translateX(0)     scale(1); }
      to   { opacity: 0; transform: translateX(-28px) scale(.97); }
    }
    @keyframes pop-correct {
      0%   { transform: scale(1); }
      45%  { transform: scale(1.035); }
      100% { transform: scale(1); }
    }
    @keyframes shake-wrong {
      0%,100% { transform: translateX(0); }
      18%  { transform: translateX(-7px); }
      36%  { transform: translateX( 7px); }
      54%  { transform: translateX(-4px); }
      72%  { transform: translateX( 4px); }
    }
    @keyframes explain-in {
      from { opacity: 0; transform: translateY(7px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes result-in {
      from { opacity: 0; transform: scale(.92); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes emoji-bounce {
      0%,100% { transform: translateY(0); }
      40%     { transform: translateY(-10px); }
      70%     { transform: translateY(-5px); }
    }

    .quiz-card              { animation: card-enter .32s cubic-bezier(.22,.68,0,1.2); }
    .quiz-card.leaving      { animation: card-leave .18s ease forwards; }
    .quiz-card.no-anim      { animation: none; }
    .choice-btn.correct     { animation: pop-correct  .38s ease; }
    .choice-btn.wrong       { animation: shake-wrong  .42s ease; }
    .explain-box            { animation: explain-in   .3s  ease; }
    .result-card            { animation: result-in    .4s  cubic-bezier(.34,1.56,.64,1); }
    .result-emoji.bounce    { animation: emoji-bounce .6s  ease .15s; }

    .next-btn {
      background: var(--accent);
      color: #fff;
      border-radius: var(--r);
      padding: 12px;
      font-size: .93rem;
      font-weight: 700;
      width: 100%;
      transition: opacity .14s;
    }
    .next-btn:hover { opacity: .83; }

    /* ── Result ── */
    .result-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r);
      padding: 52px 30px;
      text-align: center;
    }
    .result-emoji  { font-size: 2.6rem; margin-bottom: 16px; }
    .result-score  {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 4.2rem;
      font-weight: 700;
      letter-spacing: -.04em;
      line-height: 1;
      margin-bottom: 5px;
    }
    .result-denom  { font-size: 1.5rem; color: var(--ink-2); }
    .result-pct    { font-size: .88rem; color: var(--ink-2); margin-bottom: 12px; }
    .result-msg    { font-size: 1.05rem; font-weight: 700; margin-bottom: 34px; }
    .result-acts   { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

    .btn-fill {
      background: var(--accent);
      color: #fff;
      border-radius: var(--r);
      padding: 10px 26px;
      font-size: .88rem;
      font-weight: 700;
      transition: opacity .14s;
    }
    .btn-fill:hover  { opacity: .83; }
    .btn-ghost {
      border: 1.5px solid var(--line);
      border-radius: var(--r);
      padding: 10px 26px;
      font-size: .88rem;
      font-weight: 700;
      transition: border-color .14s;
    }
    .btn-ghost:hover { border-color: var(--ink-2); }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       VIEWER
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .pdf-frame {
      width: 100%;
      height: 74vh;
      border: 1px solid var(--line);
      border-radius: var(--r);
      display: block;
    }
    .img-viewer     { text-align: center; }
    .img-viewer img {
      max-width: 100%;
      border-radius: var(--r);
      border: 1px solid var(--line);
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       FOOTER
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .site-footer {
      border-top: 1px solid var(--line);
      padding: 18px 28px;
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: .78rem;
      color: var(--ink-2);
    }
    .footer-terms-link {
      font-size: .78rem;
      color: var(--ink-2);
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: color .14s;
    }
    .footer-terms-link:hover { color: var(--ink); }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       TERMS
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .terms-wrap { max-width: 680px; }
    .terms-wrap h1 {
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: -.025em;
      margin-bottom: 6px;
    }
    .terms-updated {
      font-size: .78rem;
      color: var(--ink-2);
      margin-bottom: 32px;
    }
    .terms-section { margin-bottom: 30px; }
    .terms-section h2 {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--ink-2);
      margin-bottom: 10px;
      padding-bottom: 7px;
      border-bottom: 1px solid var(--line);
    }
    .terms-section p {
      font-size: .9rem;
      line-height: 1.95;
      color: var(--ink);
    }
    .terms-section ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .terms-section ul li {
      font-size: .9rem;
      line-height: 1.8;
      padding-left: 1.2em;
      position: relative;
      color: var(--ink);
    }
    .terms-section ul li::before {
      content: '—';
      position: absolute;
      left: 0;
      color: var(--ink-2);
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       RESPONSIVE
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    @media (max-width: 560px) {
      #app           { padding: 22px 14px 60px; }
      .subjects-grid { grid-template-columns: 1fr; }
      .quiz-card     { padding: 18px 14px; }
      .result-card   { padding: 38px 16px; }
      .result-acts   { flex-direction: column; }
    }
  </style>
</head>
<body>

<!-- ── Splash ─────────────────────────────────── -->
<div id="splash">
  <div class="splash-inner">
    <div class="splash-site-title" id="splash-title">学習ノート</div>
    <div class="splash-by">by EbonySerpent</div>
  </div>
</div>

<!-- ── Header ─────────────────────────────────── -->
<header class="site-header">
  <span style="font-size:1.2rem">📚</span>
  <h1 id="site-title">学習ノート</h1>
  <button class="home-link" id="home-btn">ホームへ</button>
</header>

<!-- ── App ────────────────────────────────────── -->
<main id="app">
  <div class="loading-state"><div class="spinner"></div><p>読み込み中...</p></div>
</main>

<!-- ── Footer ────────────────────────────────── -->
<footer class="site-footer">
  <span>© <span id="footer-year"></span> EbonySerpent</span>
  <button class="footer-terms-link" onclick="go('#/terms')">利用規約</button>
</footer>

<script>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   KaTeX
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
let _katex = false;
function onKaTeXReady() {
  _katex = true;
  renderMath();
}
function renderMath() {
  if (!_katex || typeof renderMathInElement === 'undefined') return;
  renderMathInElement(document.getElementById('app'), {
    delimiters: [
      { left: '$$',  right: '$$',  display: true  },
      { left: '$',   right: '$',   display: false },
      { left: '\\[', right: '\\]', display: true  },
      { left: '\\(', right: '\\)', display: false },
    ],
    throwOnError: false,
  });
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   Splash
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const splash = document.getElementById('splash');
setTimeout(() => {
  splash.classList.add('out');
  setTimeout(() => splash.remove(), 750);
}, 2900);

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   State
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const S = {
  subjects: [],
  siteTitle: '学習ノート',
  quiz: null,
};

const app     = document.getElementById('app');
const titleEl = document.getElementById('site-title');

document.getElementById('home-btn').addEventListener('click', () => go('#/'));

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   Boot
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
async function init() {
  window.addEventListener('hashchange', route);
  try {
    const res  = await fetch('data/subjects.json');
    const data = await res.json();
    S.subjects  = data.subjects  || [];
    S.siteTitle = data.title     || '学習ノート';
    titleEl.textContent = S.siteTitle;
    document.title      = S.siteTitle;
    const st = document.getElementById('splash-title');
    if (st) st.textContent = S.siteTitle;
  } catch {
    S.subjects = null;
  }
  route();
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   Router
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function go(hash) { location.hash = hash; }

function route() {
  const h = location.hash || '#/';
  if (h === '#/' || h === '#')          { fade(renderHome); }
  else if (h.startsWith('#/subject/'))  { fade(() => renderSubject(h.slice(10))); }
  else if (h.startsWith('#/quiz/')) {
    const file = h.slice(7);
    if (!S.quiz || S.quiz.file !== file) fade(() => loadQuiz(file));
    else                                 fade(renderQuizQ);
  }
  else if (h.startsWith('#/view/'))     { fade(() => renderViewer(h.slice(7))); }
  else if (h === '#/terms')             { fade(renderTerms); }
  else                                  { fade(renderHome); }
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   Fade transition
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function fade(renderFn) {
  app.classList.add('fading');
  setTimeout(() => {
    renderFn();
    renderMath();
    requestAnimationFrame(() => requestAnimationFrame(() => app.classList.remove('fading')));
  }, 200);
}

function fadeIn(renderFn) {
  app.classList.add('fading');
  renderFn();
  renderMath();
  requestAnimationFrame(() => requestAnimationFrame(() => app.classList.remove('fading')));
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   Helpers
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const T_ICON  = { pdf:'📄', quiz:'✏️', image:'🖼️' };
const T_LABEL = { pdf:'PDF', quiz:'クイズ', image:'画像' };
const BADGE_L = ['A','B','C','D','E','F'];

function subjectOf(file) {
  return S.subjects?.find(s => s.materials?.some(m => m.file === file));
}
function backOf(file) {
  const s = subjectOf(file);
  return s ? `#/subject/${s.id}` : '#/';
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   HOME
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function renderHome() {
  if (S.subjects === null) {
    app.innerHTML = `<div class="error-box">
      <strong>data/subjects.json を読み込めませんでした</strong><br><br>
      ローカル確認には <code>npx serve .</code> または <code>python3 -m http.server 8000</code> が必要です。<br>
      ファイルをダブルクリックで直接開いても動作しません（fetch 制限）。
    </div>`;
    return;
  }
  if (!S.subjects.length) {
    app.innerHTML = `<div class="error-box">subjects.json に教科が登録されていません。</div>`;
    return;
  }
  const cards = S.subjects.map(s => {
    const c = { pdf:0, quiz:0, image:0 };
    (s.materials||[]).forEach(m => { if (m.type in c) c[m.type]++; });
    const badges = Object.entries(c)
      .filter(([,n]) => n > 0)
      .map(([t,n]) => `<span class="count-badge">${T_ICON[t]} ${T_LABEL[t]} ${n}</span>`)
      .join('');
    return `
      <div class="subject-card" onclick="location.hash='#/subject/${s.id}'">
        <span class="subject-emoji">${s.icon||'📚'}</span>
        <div>
          <div class="subject-name">${s.name}</div>
          <div class="count-badges">${badges||'<span class="count-badge">教材なし</span>'}</div>
        </div>
      </div>`;
  }).join('');

  app.innerHTML = `<div class="page-title">教科を選択</div><div class="subjects-grid">${cards}</div>`;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   SUBJECT DETAIL
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function renderSubject(id) {
  const s = S.subjects?.find(x => x.id === id);
  if (!s) { renderHome(); return; }

  const ORDER = ['quiz','pdf','image'];
  const NAMES = { quiz:'クイズ', pdf:'PDF ノート', image:'画像・図' };
  const g = {};
  (s.materials||[]).forEach(m => { (g[m.type]??=[]).push(m); });

  const sections = ORDER.filter(t => g[t]).map(t => {
    const items = g[t].map(m => {
      const dest = m.type==='quiz' ? `#/quiz/${m.file}` : `#/view/${m.file}`;
      return `
        <div class="mat-item">
          <span class="mat-icon">${T_ICON[m.type]}</span>
          <span class="mat-title">${m.title}</span>
          <button class="open-btn" onclick="location.hash='${dest}'">開く</button>
        </div>`;
    }).join('');
    return `
      <div class="mat-section">
        <div class="mat-label">${NAMES[t]}</div>
        <div class="mat-list">${items}</div>
      </div>`;
  }).join('');

  app.innerHTML = `
    <button class="back-btn" onclick="go('#/')">← 教科一覧</button>
    <div class="subject-header">
      <span class="subject-icon-lg">${s.icon||'📚'}</span>
      <h2>${s.name}</h2>
    </div>
    ${sections||'<p style="color:var(--ink-2)">教材が登録されていません</p>'}`;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   QUIZ
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
async function loadQuiz(file) {
  app.innerHTML = `<div class="loading-state"><div class="spinner"></div><p>読み込み中...</p></div>`;
  app.classList.remove('fading');
  try {
    const res = await fetch(file);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    S.quiz = { data, file, sid: subjectOf(file)?.id||null, idx:0, ans:[], phase:'q' };
    fadeIn(renderQuizQ);
  } catch(e) {
    app.innerHTML = `<div class="error-box">クイズを読み込めませんでした<br><code>${file}</code><br>${e.message}</div>`;
    app.classList.remove('fading');
  }
}

function renderQuizQ(noAnim = false) {
  const { data, idx, phase } = S.quiz;
  const q     = data.questions[idx];
  const total = data.questions.length;
  const bk    = S.quiz.sid ? `#/subject/${S.quiz.sid}` : '#/';

  const choiceLayout = q.choices.length <= 2 ? 'style="flex-direction:row;flex-wrap:wrap;"' : '';
  const choices = q.choices.map((c,i) => {
    let cls = 'choice-btn', dis = '';
    if (phase === 'a') {
      dis = 'disabled';
      const chosen = S.quiz.ans[idx];
      if      (i === q.answer) cls += ' correct';
      else if (i === chosen)   cls += ' wrong';
    }
    return `
      <button class="${cls}" ${dis} onclick="answerQ(${i})">
        <span class="badge">${BADGE_L[i]}</span>
        <span>${c}</span>
      </button>`;
  }).join('');

  const explain = (phase==='a' && q.explanation)
    ? `<div class="explain-box">${q.explanation}</div>` : '';

  const isLast = idx+1 >= total;
  const nxtBtn = phase==='a'
    ? `<button class="next-btn" id="nxt">${isLast?'結果を見る →':'次の問題 →'}</button>` : '';

  app.innerHTML = `
    <div class="quiz-wrap">
      <button class="back-btn" onclick="location.hash='${bk}'">← 戻る</button>
      <div class="quiz-meta">
        <div class="quiz-title">${data.title}</div>
        <div class="prog-bar"><div class="prog-fill" style="width:${(idx+1)/total*100}%"></div></div>
        <div class="prog-text">${idx+1} / ${total} 問</div>
      </div>
      <div class="quiz-card${noAnim ? ' no-anim' : ''}">
        <div class="q-text">Q${idx+1}. ${q.question}</div>
        <div class="choices" ${choiceLayout}>${choices}</div>
        ${explain}
      </div>
      ${nxtBtn}
    </div>`;

  document.getElementById('nxt')?.addEventListener('click', nextQ);
}

function answerQ(i) {
  if (S.quiz.phase !== 'q') return;
  S.quiz.ans[S.quiz.idx] = i;
  S.quiz.phase = 'a';
  renderQuizQ(true);
  renderMath();
}

function nextQ() {
  if (S.quiz.idx+1 >= S.quiz.data.questions.length) {
    fade(renderResult);
    return;
  }
  const card = document.querySelector('.quiz-card');
  if (card) {
    card.classList.add('leaving');
    setTimeout(() => {
      S.quiz.idx++;
      S.quiz.phase = 'q';
      renderQuizQ();
      renderMath();
    }, 180);
  } else {
    S.quiz.idx++;
    S.quiz.phase = 'q';
    fade(renderQuizQ);
  }
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   RESULT
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function renderResult() {
  const { data, ans, file, sid } = S.quiz;
  const total = data.questions.length;
  const score = ans.filter((a,i) => a === data.questions[i].answer).length;
  const pct   = Math.round(score/total*100);
  const bk    = sid ? `#/subject/${sid}` : '#/';
  const [emoji,msg] =
    pct===100 ? ['🎉','パーフェクト！完璧です！'] :
    pct>=80   ? ['👏','よくできました！'] :
    pct>=60   ? ['💪','もう少しで完璧！'] :
               ['📖','復習してもう一度！'];

  app.innerHTML = `
    <div class="quiz-wrap">
      <div class="result-card">
        <div class="result-emoji bounce">${emoji}</div>
        <div class="result-score"><span id="r-score">0</span><span class="result-denom"> / ${total}</span></div>
        <div class="result-pct">${pct}% 正解</div>
        <div class="result-msg">${msg}</div>
        <div class="result-acts">
          <button class="btn-fill"  id="r-retry">もう一度挑戦</button>
          <button class="btn-ghost" id="r-back" >教材一覧に戻る</button>
        </div>
      </div>
    </div>`;

  animateCount(document.getElementById('r-score'), score, 750);
  document.getElementById('r-retry').addEventListener('click', () => { S.quiz=null; fade(()=>loadQuiz(file)); });
  document.getElementById('r-back' ).addEventListener('click', () => go(bk));
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   VIEWER
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function renderViewer(file) {
  const bk   = backOf(file);
  const name = file.split('/').pop();
  const isPdf = /\.pdf$/i.test(file);
  const isImg = /\.(png|jpe?g|gif|webp|svg)$/i.test(file);

  let body;
  if      (isPdf) body = `<iframe class="pdf-frame" src="${file}" title="${name}"></iframe>`;
  else if (isImg) body = `<div class="img-viewer"><img src="${file}" alt="${name}" /></div>`;
  else            body = `<div class="error-box">プレビューできません: <code>${name}</code></div>`;

  app.innerHTML = `
    <button class="back-btn" onclick="go('${bk}')">← 戻る</button>
    ${body}`;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   HELPERS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function animateCount(el, to, dur) {
  if (!el) return;
  const t0  = performance.now();
  const ease = t => 1 - (1-t)**3;
  (function step(now) {
    const p = Math.min((now - t0) / dur, 1);
    el.textContent = Math.round(ease(p) * to);
    if (p < 1) requestAnimationFrame(step);
  })(t0);
}
